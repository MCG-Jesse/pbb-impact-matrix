<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program Impact Matrix Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; background: #F5F6F8; color: #1A1A2E; min-height: 100vh; }
  #root { min-height: 100vh; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef } = React;



const XLSX_CDN = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
const H2C_CDN = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
const JSPDF_CDN = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";

// Tyler Tech colors
const TY = {
  navy: "#003B5C", blue: "#0076D6", orange: "#F2682A", lightGray: "#F5F6F8",
  border: "#E0E4E8", text: "#1A1A2E", textLight: "#5A6577", white: "#FFFFFF",
  green: "#1B8A5A", red: "#C53030", yellow: "#B8870A",
};

const QUADRANT_DESCRIPTIONS = {
  LHLL: "High impact, low cost programs with partnership opportunity possible and low/no requirement - share costs or in-source for new revenue",
  LHLH: "Getting higher impact for lower cost - consider if increases would further achieve impact",
  LHHL: "Fortunate to be in high impact, low cost programs with partnership opportunity possible - share costs or in-source for new revenue",
  LHHH: "Appear to be of high relevance for the cost, and required - check opportunity to offset mandate with cost recovery, grant funding",
  HHLL: "Getting impact, costs are high, is there opportunity to share the costs (low reliance), or in-source for $$$",
  HHLH: "Impact is high, with high price, low/no requirement and customers dependent on us - is there a cost recovery opportunity?",
  HHHL: "Pursue partnership, regionalization if possible (in-source or merger) to share high cost of highly mandated programs with low reliance",
  HHHH: "Your unique core, at a cost - is there an opportunity to consider cost recovery? These programs are growing (check demand)",
  LLLL: "Any opportunity to leverage partners (low reliance) and reallocate resources? In the least, consider in-sourcing for revenue.",
  LLLH: "Providing a service mainly due to reliance - is there an opportunity to spin off program into non-profit or business, incentivize other entities",
  LLHL: "Unfunded mandate, other providers: partner or cost recovery",
  LLHH: "We're mandated, with low alignment and few partners - can we recover costs, or minimize level of service to meet the mandate?",
  HLLL: "Look for full cost recovery, in-source for rev / partner, consider reducing / eliminating service level, maximize efficiency if essential.",
  HLLH: "Low impact with high cost, and no (or low) mandate - efficiency, reduce service level, look for full cost recovery or spin off",
  HLHL: "Mandated, low impact, partner - what does mandate require? Look for full cost recovery, leverage partners, bare min LOS",
  HLHH: "Unfunded mandates with lower impact and no partner - what does the mandate require (scrutinize service levels), focus lobby efforts",
};

const OPPORTUNITY_TEXT = {
  LLLL: "Optimize low-impact services through partnerships and efficient resource reallocation.",
  LLLH: "Spin off programs to non-profits or private businesses to maintain service levels and reduce government burden.",
  LLHL: "Meet minimum compliance with mandates while exploring cost recovery options.",
  LLHH: "Balance mandate requirements and community expectations through cost recovery and efficiency.",
  HLLL: "Focus on cost recovery and efficiency improvements through in-sourcing and partnerships.",
  HLLH: "Evaluate service necessity and explore partnerships to manage high costs.",
  HLHL: "Efficiently meet mandate requirements through strategic adjustments and partnerships.",
  HLHH: "Manage high-cost mandated services through cost recovery and efficiency improvements.",
  LHLL: "Enhance significant impact programs at low cost through targeted investments and partnerships.",
  LHLH: "Increase the effectiveness of high-impact, low-cost programs through partnerships and additional funding.",
  LHHL: "Maximize community impact while ensuring compliance with mandates.",
  LHHH: "Maintain and enhance critical high-impact, low-cost services to meet community needs and mandate requirements.",
  HHLL: "Manage high-cost impactful services through cost-sharing partnerships and cost recovery mechanisms.",
  HHLH: "Focus on cost management and sustainability for high-cost, high-impact services with high community reliance.",
  HHHL: "Strategically manage high-cost mandated services through partnerships and cost-saving opportunities.",
  HHHH: "Ensure the sustainability of critical high-cost, high-impact services through cost recovery, efficiency improvements, and strategic investments.",
};

const RANGE_PCT = {
  LLLL: [0.50, 0.60], LLLH: [0.50, 0.60], LLHL: [0.30, 0.40], LLHH: [0.30, 0.40],
  HLLL: [0.50, 0.70], HLLH: [0.50, 0.70], HLHL: [0.30, 0.40], HLHH: [0.30, 0.40],
  LHLL: [0.20, 0.40], LHLH: [0.20, 0.40], LHHL: [0.20, 0.40], LHHH: [0.20, 0.40],
  HHLL: [0.10, 0.15], HHLH: [0.05, 0.10], HHHL: [0.05, 0.10], HHHH: [0.05, 0.10],
};

const ALL_CODES = ["LLLL","LLLH","LLHL","LLHH","HLLL","HLLH","HLHL","HLHH","LHLL","LHLH","LHHL","LHHH","HHLL","HHLH","HHHL","HHHH"];

const CODE_DESCRIPTIONS = {
  LLLL: "Low Impact, Low Cost, Low Mandate, Low Reliance",
  LLLH: "Low Impact, Low Cost, Low Mandate, High Reliance",
  LLHL: "Low Impact, Low Cost, High Mandate, Low Reliance",
  LLHH: "Low Impact, Low Cost, High Mandate, High Reliance",
  HLLL: "Low Impact, High Cost, Low Mandate, Low Reliance",
  HLLH: "Low Impact, High Cost, Low Mandate, High Reliance",
  HLHL: "Low Impact, High Cost, High Mandate, Low Reliance",
  HLHH: "Low Impact, High Cost, High Mandate, High Reliance",
  LHLL: "High Impact, Low Cost, Low Mandate, Low Reliance",
  LHLH: "High Impact, Low Cost, Low Mandate, High Reliance",
  LHHL: "High Impact, Low Cost, High Mandate, Low Reliance",
  LHHH: "High Impact, Low Cost, High Mandate, High Reliance",
  HHLL: "High Impact, High Cost, Low Mandate, Low Reliance",
  HHLH: "High Impact, High Cost, Low Mandate, High Reliance",
  HHHL: "High Impact, High Cost, High Mandate, Low Reliance",
  HHHH: "High Impact, High Cost, High Mandate, High Reliance",
};

function fmt$(n) {
  if (n == null || isNaN(n)) return "$0";
  return "$" + Math.round(Math.max(0, n)).toLocaleString("en-US");
}

function fmtM(n) {
  if (n == null || isNaN(n)) return "$0.0M";
  return "$" + (Math.floor((Math.max(0, n) / 1000000) * 10) / 10).toFixed(1) + "M";
}

function SubCell({ code, data, rankInfo, quadColor }) {
  const count = data?.count || 0;
  const investment = data?.investment || 0;
  const rank = rankInfo?.rank || "-";
  const cat = rankInfo?.cat || "-";
  const desc = QUADRANT_DESCRIPTIONS[code] || "";
  const costLabel = code[0] === "H" ? "Higher Cost" : "Low Cost";
  const impactLabel = code[1] === "H" ? "Higher Impact" : "Low Impact";
  const mandateLabel = code[2] === "H" ? "High Mandate" : "Low/No Mandate";
  const relianceLabel = code[3] === "H" ? "High Reliance" : "Low Reliance";
  const title = `${impactLabel}, ${costLabel}, ${mandateLabel}, ${relianceLabel}`;

  return (
    <div style={{
      background: TY.white, borderRadius: 4, display: "flex", flexDirection: "column",
      border: `1px solid ${quadColor}33`, overflow: "hidden", minHeight: 150,
      boxShadow: "0 1px 3px rgba(0,0,0,0.06)",
    }}>
      <div style={{
        fontSize: 12, fontWeight: 700, color: TY.white, background: quadColor,
        padding: "5px 8px", lineHeight: 1.3, textAlign: "center",
      }}>{title}</div>
      <div style={{ padding: "8px 10px", display: "flex", flexDirection: "column", flex: 1, gap: 2 }}>
        <div style={{ fontSize: 10, color: TY.textLight, lineHeight: 1.3, fontStyle: "italic", minHeight: 28 }}>{desc}</div>
        <div style={{ marginTop: "auto", textAlign: "center" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: TY.text }}>
            {count} <span style={{ fontWeight: 400, color: TY.textLight }}>programs</span>
          </div>
          <div style={{ fontSize: 12, color: TY.text, marginTop: 2, fontWeight: 700 }}>
            {fmt$(investment)} <span style={{ color: TY.textLight }}>subsidized cost</span>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4, borderTop: `1px solid ${TY.border}`, paddingTop: 4 }}>
            <span style={{ fontSize: 12, color: TY.textLight, fontWeight: 600 }}>Rank {rank}</span>
            <span style={{ fontSize: 12, color: TY.textLight, fontWeight: 600 }}>Category {cat}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function QuadrantBox({ title, titleColor, bgColor, borderColor, codes, dataByCode, rankData }) {
  const vlabelInner = {
    position: "absolute", top: "50%", left: "50%",
    transform: "translate(-50%, -50%) rotate(-90deg)",
    fontSize: 8, fontWeight: 700, color: TY.text, whiteSpace: "nowrap",
    letterSpacing: 0.3, textTransform: "uppercase",
  };
  return (
    <div style={{
      background: bgColor, border: `2px solid ${borderColor}`, borderRadius: 6,
      padding: 8, display: "flex", flexDirection: "column", gap: 4,
      boxShadow: "0 2px 6px rgba(0,0,0,0.05)",
    }}>
      <div style={{ textAlign: "center", fontSize: 14, fontWeight: 800, color: titleColor, letterSpacing: 0.2, padding: "2px 0 4px" }}>{title}</div>
      <div style={{ display: "grid", gridTemplateColumns: "18px 1fr 1fr", gap: 5, alignItems: "stretch" }}>
        <div style={{ position: "relative", width: 18, minHeight: 80 }}><div style={vlabelInner}>High Reliance</div></div>
        <SubCell code={codes[0]} data={dataByCode[codes[0]]} rankInfo={rankData[codes[0]]} quadColor={borderColor} />
        <SubCell code={codes[1]} data={dataByCode[codes[1]]} rankInfo={rankData[codes[1]]} quadColor={borderColor} />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "18px 1fr 1fr", gap: 5, alignItems: "stretch" }}>
        <div style={{ position: "relative", width: 18, minHeight: 80 }}><div style={vlabelInner}>Low Reliance</div></div>
        <SubCell code={codes[2]} data={dataByCode[codes[2]]} rankInfo={rankData[codes[2]]} quadColor={borderColor} />
        <SubCell code={codes[3]} data={dataByCode[codes[3]]} rankInfo={rankData[codes[3]]} quadColor={borderColor} />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "18px 1fr 1fr", gap: 5 }}>
        <div />
        <div style={{ fontSize: 8, color: TY.text, fontWeight: 700, letterSpacing: 0.3, textTransform: "uppercase", textAlign: "center" }}>Low/No Mandate</div>
        <div style={{ fontSize: 8, color: TY.text, fontWeight: 700, letterSpacing: 0.3, textTransform: "uppercase", textAlign: "center" }}>Highly Mandated</div>
      </div>
    </div>
  );
}

function OpportunitiesChart({ matrixData, entityName }) {
  const { oppByCode } = matrixData;
  let totalLow = 0, totalHigh = 0;
  ALL_CODES.forEach((code) => {
    const opp = oppByCode[code] || 0;
    const [pLow, pHigh] = RANGE_PCT[code];
    totalLow += opp * pLow;
    totalHigh += opp * pHigh;
  });

  return (
    <div style={{ background: TY.white, borderRadius: 8, color: TY.text, maxWidth: 1150, margin: "0 auto", padding: 24, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
      <h2 style={{ margin: "0 0 4px", fontSize: 18, fontWeight: 800, color: TY.navy }}>{entityName ? `${entityName} — ` : ""}Opportunities Chart</h2>
      <p style={{ margin: "0 0 16px", fontSize: 12, color: TY.textLight }}>
        Potential savings by category based on subsidized cost and category-specific recovery ranges.
      </p>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
        <thead>
          <tr style={{ background: TY.navy, color: TY.white }}>
            <th style={{ padding: "10px 12px", textAlign: "center", fontWeight: 700, width: 70, borderRight: "1px solid #1a5a7a" }}>Category</th>
            <th style={{ padding: "10px 12px", textAlign: "left", fontWeight: 700, borderRight: "1px solid #1a5a7a" }}>Description</th>
            <th style={{ padding: "10px 12px", textAlign: "left", fontWeight: 700, borderRight: "1px solid #1a5a7a" }}>Opportunities</th>
            <th style={{ padding: "10px 12px", textAlign: "center", fontWeight: 700, width: 180 }}>Potential Savings</th>
          </tr>
        </thead>
        <tbody>
          {ALL_CODES.map((code, i) => {
            const opp = oppByCode[code] || 0;
            const [pLow, pHigh] = RANGE_PCT[code];
            return (
              <tr key={code} style={{ background: i % 2 === 0 ? "#f7f9fb" : TY.white, borderBottom: `1px solid ${TY.border}` }}>
                <td style={{ padding: "10px 12px", textAlign: "center", fontWeight: 700, fontSize: 13, color: TY.navy, borderRight: `1px solid ${TY.border}` }}>{i + 1}</td>
                <td style={{ padding: "10px 12px", color: TY.text, borderRight: `1px solid ${TY.border}`, lineHeight: 1.4 }}>{CODE_DESCRIPTIONS[code]}</td>
                <td style={{ padding: "10px 12px", color: TY.textLight, borderRight: `1px solid ${TY.border}`, lineHeight: 1.4, fontStyle: "italic" }}>{OPPORTUNITY_TEXT[code]}</td>
                <td style={{ padding: "10px 12px", textAlign: "center", fontWeight: 600, color: TY.green, fontSize: 12 }}>{fmtM(opp * pLow)} to {fmtM(opp * pHigh)}</td>
              </tr>
            );
          })}
        </tbody>
        <tfoot>
          <tr style={{ background: TY.navy, color: TY.white }}>
            <td colSpan={3} style={{ padding: "12px", fontWeight: 700, fontSize: 13 }}>The sum total of the potential savings ranges from</td>
            <td style={{ padding: "12px", textAlign: "center", fontWeight: 700, fontSize: 13 }}>{fmtM(totalLow)} to {fmtM(totalHigh)}</td>
          </tr>
        </tfoot>
      </table>
    </div>
  );
}

function ProgramList({ matrixData, entityName }) {
  const { programs, catMap } = matrixData;
  const [sortCol, setSortCol] = useState("cat");
  const [sortAsc, setSortAsc] = useState(true);
  const [filterCat, setFilterCat] = useState("all");

  const handleSort = (col) => { if (sortCol === col) setSortAsc(!sortAsc); else { setSortCol(col); setSortAsc(true); } };

  const enriched = programs.map(p => ({ ...p, cat: catMap[p.code] || 0 }));
  const filtered = filterCat === "all" ? enriched : enriched.filter(p => String(p.cat) === filterCat);
  const sorted = [...filtered].sort((a, b) => {
    let cmp = 0;
    if (sortCol === "name") cmp = (a.name || "").localeCompare(b.name || "");
    else if (sortCol === "cost") cmp = a.subsidizedCost - b.subsidizedCost;
    else if (sortCol === "cat") cmp = a.cat - b.cat;
    return sortAsc ? cmp : -cmp;
  });

  const arrow = (col) => sortCol === col ? (sortAsc ? " ▲" : " ▼") : "";
  const thStyle = { padding: "10px 12px", textAlign: "left", fontWeight: 700, cursor: "pointer", borderRight: "1px solid #1a5a7a", userSelect: "none" };
  const cats = [...new Set(enriched.map(p => p.cat))].sort((a, b) => a - b);

  return (
    <div style={{ background: TY.white, borderRadius: 8, color: TY.text, maxWidth: 1150, margin: "0 auto", padding: 24, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
        <div>
          <h2 style={{ margin: "0 0 4px", fontSize: 18, fontWeight: 800, color: TY.navy }}>{entityName ? `${entityName} — ` : ""}Program Details</h2>
          <p style={{ margin: 0, fontSize: 12, color: TY.textLight }}>
            {sorted.length} programs{filterCat !== "all" ? ` in Category ${filterCat}` : ""} · Total Subsidized Cost: {fmt$(sorted.reduce((s, p) => s + Math.max(0, p.subsidizedCost), 0))}
          </p>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <label style={{ fontSize: 12, color: TY.textLight, fontWeight: 600 }}>Filter by Category:</label>
          <select value={filterCat} onChange={(e) => setFilterCat(e.target.value)} style={{
            padding: "6px 10px", fontSize: 12, borderRadius: 5, border: `1px solid ${TY.border}`, background: TY.white, color: TY.text,
          }}>
            <option value="all">All Categories</option>
            {cats.map(c => <option key={c} value={String(c)}>Category {c}</option>)}
          </select>
        </div>
      </div>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
        <thead>
          <tr style={{ background: TY.navy, color: TY.white }}>
            <th style={{ ...thStyle, width: 70, textAlign: "center" }} onClick={() => handleSort("cat")}>{"Cat" + arrow("cat")}</th>
            <th style={{ ...thStyle, width: 200 }} onClick={() => handleSort("name")}>{"Program" + arrow("name")}</th>
            <th style={thStyle}>Description</th>
            <th style={{ ...thStyle, width: 150, textAlign: "right", borderRight: "none" }} onClick={() => handleSort("cost")}>{"Subsidized Cost" + arrow("cost")}</th>
          </tr>
        </thead>
        <tbody>
          {sorted.map((p, i) => (
            <tr key={p.pid + "-" + i} style={{ background: i % 2 === 0 ? "#f7f9fb" : TY.white, borderBottom: `1px solid ${TY.border}` }}>
              <td style={{ padding: "10px 12px", textAlign: "center", fontWeight: 700, fontSize: 13, color: TY.navy, borderRight: `1px solid ${TY.border}` }}>{p.cat}</td>
              <td style={{ padding: "10px 12px", color: TY.text, fontWeight: 600, borderRight: `1px solid ${TY.border}` }}>{p.name}</td>
              <td style={{ padding: "10px 12px", color: TY.textLight, lineHeight: 1.4, borderRight: `1px solid ${TY.border}`, fontSize: 11 }}>{p.desc}</td>
              <td style={{ padding: "10px 12px", textAlign: "right", fontWeight: 600, color: TY.text }}>{fmt$(p.subsidizedCost)}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function App() {
  const [file1, setFile1] = useState(null);
  const [file2, setFile2] = useState(null);
  const [file1Name, setFile1Name] = useState("");
  const [file2Name, setFile2Name] = useState("");
  const [matrixData, setMatrixData] = useState(null);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [entityName, setEntityName] = useState("");
  const [costThreshold, setCostThreshold] = useState("");
  const [medianNote, setMedianNote] = useState("");
  const [debugInfo, setDebugInfo] = useState("");
  const [activeTab, setActiveTab] = useState("matrix");
  const [exporting, setExporting] = useState(false);
  const matrixRef = useRef(null);
  const opportunitiesRef = useRef(null);
  const programsRef = useRef(null);

  const loadScript = (src) => new Promise((resolve, reject) => {
    const existing = document.querySelector(`script[src="${src}"]`);
    if (existing) { resolve(); return; }
    const s = document.createElement("script");
    s.src = src;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error("Failed to load " + src));
    document.head.appendChild(s);
  });

  const loadXLSX = useCallback(() => {
    return new Promise((resolve, reject) => {
      if (window.XLSX) { resolve(); return; }
      const s = document.createElement("script");
      s.src = XLSX_CDN;
      s.onload = () => resolve();
      s.onerror = () => reject(new Error("Failed to load XLSX library"));
      document.head.appendChild(s);
    });
  }, []);

  const readFile = (file) => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = (e) => res(new Uint8Array(e.target.result));
    r.onerror = () => rej(new Error("Failed to read file"));
    r.readAsArrayBuffer(file);
  });

  const findCol = (keys, ...searches) => {
    for (const s of searches) { const f = keys.find(k => k.toLowerCase().trim() === s.toLowerCase()); if (f) return f; }
    for (const s of searches) { const f = keys.find(k => k.toLowerCase().includes(s.toLowerCase())); if (f) return f; }
    return searches[0];
  };

  // Auto-calculate median on File 1 upload
  const handleFile1 = async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    setFile1(f);
    setFile1Name(f.name);

    try {
      await loadXLSX();
      const data = await readFile(f);
      const wb = window.XLSX.read(data, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = window.XLSX.utils.sheet_to_json(ws, { defval: "" });
      const cols = rows.length > 0 ? Object.keys(rows[0]) : [];
      const persCol = findCol(cols, "Personnel");
      const nonpersCol = findCol(cols, "NonPersonnel", "Non-Personnel", "Non Personnel");
      const revCol = findCol(cols, "Revenue");

      const subsidizedCosts = [];
      rows.forEach((row) => {
        const personnel = parseFloat(row[persCol]) || 0;
        const nonPersonnel = parseFloat(row[nonpersCol]) || 0;
        const revenue = parseFloat(row[revCol]) || 0;
        const sub = personnel + nonPersonnel - revenue;
        if (sub > 0) subsidizedCosts.push(sub);
      });

      if (subsidizedCosts.length > 0) {
        subsidizedCosts.sort((a, b) => a - b);
        const mid = Math.floor(subsidizedCosts.length / 2);
        const median = subsidizedCosts.length % 2 === 0
          ? Math.round((subsidizedCosts[mid - 1] + subsidizedCosts[mid]) / 2)
          : Math.round(subsidizedCosts[mid]);
        setCostThreshold(String(median));
        setMedianNote(`Median of ${subsidizedCosts.length} programs with positive subsidized cost: ${fmt$(median)}`);
      }
    } catch (err) {
      console.error("Median calculation error:", err);
    }
  };

  const getContentRef = () => activeTab === "matrix" ? matrixRef : activeTab === "opportunities" ? opportunitiesRef : programsRef;
  const getFileName = () => {
    const prefix = entityName ? entityName.replace(/[^a-zA-Z0-9]/g, "_") : "Report";
    const suffix = activeTab === "matrix" ? "Impact_Matrix" : activeTab === "opportunities" ? "Opportunities_Chart" : "Program_Details";
    return `${prefix}_${suffix}`;
  };

  const captureAtFixedWidth = async (el) => {
    await loadScript(H2C_CDN);
    const origWidth = el.style.width;
    const origMaxWidth = el.style.maxWidth;
    const origOverflow = el.style.overflow;
    el.style.width = "1200px";
    el.style.maxWidth = "1200px";
    el.style.overflow = "visible";
    await new Promise(r => setTimeout(r, 150));
    const canvas = await window.html2canvas(el, { scale: 2, backgroundColor: "#ffffff", useCORS: true, width: 1200, scrollY: -window.scrollY });
    el.style.width = origWidth;
    el.style.maxWidth = origMaxWidth;
    el.style.overflow = origOverflow;
    return canvas;
  };

  const exportPNG = async () => { const el = getContentRef().current; if (!el) return; setExporting(true); try { const canvas = await captureAtFixedWidth(el); const link = document.createElement("a"); link.download = getFileName() + ".png"; link.href = canvas.toDataURL("image/png"); link.click(); } catch (err) { console.error(err); } setExporting(false); };

  const exportPDF = async () => { const el = getContentRef().current; if (!el) return; setExporting(true); try { await loadScript(JSPDF_CDN); const canvas = await captureAtFixedWidth(el); const imgData = canvas.toDataURL("image/png"); const { jsPDF } = window.jspdf; const pdf = new jsPDF({ orientation: "landscape", unit: "pt", format: "letter" }); const pw = pdf.internal.pageSize.getWidth(), ph = pdf.internal.pageSize.getHeight(), m = 20; const ratio = Math.min((pw - m*2) / canvas.width, (ph - m*2) / canvas.height); const w = canvas.width * ratio, h = canvas.height * ratio; pdf.addImage(imgData, "PNG", (pw-w)/2, (ph-h)/2, w, h); pdf.save(getFileName() + ".pdf"); } catch (err) { console.error(err); } setExporting(false); };

  const exportExcel = async () => {
    if (!matrixData) return; setExporting(true);
    try {
      await loadXLSX(); const X = window.XLSX; const wb = X.utils.book_new();
      if (activeTab === "matrix") {
        const rows = ALL_CODES.map((code, i) => ({ Category: i+1, Description: CODE_DESCRIPTIONS[code], Programs: matrixData.byCode[code]?.count||0, "Subsidized Cost": matrixData.byCode[code]?.investment||0, Rank: matrixData.rankData[code]?.rank||"" }));
        const ws = X.utils.json_to_sheet(rows); ws["!cols"] = [{wch:10},{wch:50},{wch:12},{wch:18},{wch:8}]; X.utils.book_append_sheet(wb, ws, "Impact Matrix");
      } else if (activeTab === "opportunities") {
        const rows = ALL_CODES.map((code, i) => { const opp = matrixData.oppByCode[code]||0; const [pL,pH] = RANGE_PCT[code]; return { Category: i+1, Description: CODE_DESCRIPTIONS[code], Opportunities: OPPORTUNITY_TEXT[code], "Savings Low": opp*pL, "Savings High": opp*pH }; });
        const ws = X.utils.json_to_sheet(rows); ws["!cols"] = [{wch:10},{wch:50},{wch:60},{wch:16},{wch:16}]; X.utils.book_append_sheet(wb, ws, "Opportunities");
      } else if (activeTab === "programs") {
        const rows = matrixData.programs.map(p => ({ Category: matrixData.catMap[p.code]||0, Program: p.name, Description: p.desc, "Subsidized Cost": Math.max(0, p.subsidizedCost), "Category Description": CODE_DESCRIPTIONS[p.code]||"" })).sort((a,b) => a.Category - b.Category);
        const ws = X.utils.json_to_sheet(rows); ws["!cols"] = [{wch:10},{wch:30},{wch:60},{wch:18},{wch:50}]; X.utils.book_append_sheet(wb, ws, "Program Details");
      }
      X.writeFile(wb, getFileName() + ".xlsx");
    } catch (err) { console.error(err); }
    setExporting(false);
  };

  const processData = async () => {
    if (!file1 || !file2) { setError("Please upload both files."); return; }
    setLoading(true); setError(""); setDebugInfo("");
    try {
      await loadXLSX(); const XLSX = window.XLSX; const debug = [];

      const data1 = await readFile(file1); const wb1 = XLSX.read(data1, { type: "array" });
      debug.push("File 1 sheets: " + wb1.SheetNames.join(", "));
      const ws1 = wb1.Sheets[wb1.SheetNames[0]]; const rows1 = XLSX.utils.sheet_to_json(ws1, { defval: "" });
      debug.push("File 1 Tab 1 rows: " + rows1.length);

      const data2 = await readFile(file2); const wb2 = XLSX.read(data2, { type: "array" });
      debug.push("File 2 sheets: " + wb2.SheetNames.join(", "));
      if (wb2.SheetNames.length < 2) throw new Error("File 2 needs at least 2 tabs.");
      const ws2 = wb2.Sheets[wb2.SheetNames[1]]; const rows2 = XLSX.utils.sheet_to_json(ws2, { defval: "" });
      debug.push("File 2 Tab 2 rows: " + rows2.length);

      const cols1 = rows1.length > 0 ? Object.keys(rows1[0]) : [];
      const cols2 = rows2.length > 0 ? Object.keys(rows2[0]) : [];

      const pidCol1 = findCol(cols1, "program_id");
      const persCol = findCol(cols1, "Personnel");
      const nonpersCol = findCol(cols1, "NonPersonnel", "Non-Personnel", "Non Personnel");
      const quartCol = findCol(cols1, "Quartile", "FinalQuartile", "Final Quartile");
      const progCol = findCol(cols1, "Program or Service", "Program");
      const descCol = findCol(cols1, "Program or Service Description", "Program Description", "Description");
      const revCol = findCol(cols1, "Revenue");

      const pidCol2 = findCol(cols2, "program_id");
      const abbrCol = findCol(cols2, "Result Abbr", "Priority Abbr");
      const scoreCol2 = findCol(cols2, "Final Score");
      const descCol2 = findCol(cols2, "Program or Service Description", "Program Description", "Description");

      const hasDescInFile1 = cols1.some(c => c.toLowerCase().includes("description"));
      debug.push("File 1 cols: " + cols1.join(", "));
      debug.push("File 2 cols: " + cols2.join(", "));

      const mandateScores = {}, relianceScores = {}, descriptionsFromFile2 = {};
      rows2.forEach((row) => {
        const pid = String(row[pidCol2]).trim();
        const abbr = String(row[abbrCol]).trim();
        const score = parseFloat(row[scoreCol2]) || 0;
        if (!pid || pid === "undefined") return;
        if (abbr === "Mandate") mandateScores[pid] = (mandateScores[pid] || 0) + score;
        else if (abbr === "Reliance") relianceScores[pid] = (relianceScores[pid] || 0) + score;
        if (!descriptionsFromFile2[pid]) { const d = String(row[descCol2] || "").trim(); if (d) descriptionsFromFile2[pid] = d; }
      });

      debug.push("Mandate scores: " + Object.keys(mandateScores).length + ", Reliance: " + Object.keys(relianceScores).length);

      const quartileValues = new Set();
      rows1.slice(0, 20).forEach(r => { const v = r[quartCol]; if (v !== "" && v != null) quartileValues.add(String(v).trim()); });
      const sampleQ = Array.from(quartileValues).slice(0, 6);
      debug.push("Sample quartiles: " + sampleQ.join(", "));
      const isNumericQuartile = sampleQ.every(v => !isNaN(parseFloat(v)));

      const threshold = parseFloat(costThreshold) || 445000;
      debug.push("Cost threshold: " + fmt$(threshold));
      const programs = [];

      rows1.forEach((row) => {
        const pid = String(row[pidCol1]).trim();
        const personnel = parseFloat(row[persCol]) || 0;
        const nonPersonnel = parseFloat(row[nonpersCol]) || 0;
        const totalCost = personnel + nonPersonnel;
        const revenue = parseFloat(row[revCol]) || 0;
        const subsidizedCost = totalCost - revenue;
        const quartile = String(row[quartCol]).trim();
        const mScore = mandateScores[pid] || 0;
        const rScore = relianceScores[pid] || 0;

        if (totalCost === 0) return;

        // Use subsidized cost for classification
        const costHL = subsidizedCost > threshold ? "H" : "L";
        let impactHL;
        if (isNumericQuartile) { const qNum = parseFloat(quartile); impactHL = (qNum === 1 || qNum === 2) ? "H" : "L"; }
        else { impactHL = (quartile === "Most Aligned" || quartile === "More Aligned") ? "H" : "L"; }
        const mandateHL = mScore > 2 ? "H" : "L";
        const relianceHL = rScore > 2 ? "H" : "L";
        const code = costHL + impactHL + mandateHL + relianceHL;

        const descFromFile1 = hasDescInFile1 ? String(row[descCol] || "").trim() : "";
        const desc = descFromFile1 || descriptionsFromFile2[pid] || "";

        programs.push({ name: row[progCol], desc, pid, totalCost, revenue, subsidizedCost, revOpp: Math.max(0, subsidizedCost), code });
      });

      debug.push("Classified: " + programs.length + " programs");
      if (programs.length === 0) throw new Error("No programs classified.");

      // Aggregate — use subsidized cost (capped at 0) for investment display
      const byCode = {}, oppByCode = {};
      programs.forEach((p) => {
        if (!byCode[p.code]) byCode[p.code] = { count: 0, investment: 0 };
        byCode[p.code].count++;
        byCode[p.code].investment += Math.max(0, p.subsidizedCost);
        oppByCode[p.code] = (oppByCode[p.code] || 0) + Math.max(0, p.subsidizedCost);
      });

      const catMap = {}; ALL_CODES.forEach((c, i) => { catMap[c] = i + 1; });
      const ranked = ALL_CODES.map(c => ({ code: c, cat: catMap[c], inv: byCode[c]?.investment || 0 })).sort((a, b) => b.inv - a.inv);
      const rankData = {}; ranked.forEach((item, i) => { rankData[item.code] = { rank: i + 1, cat: item.cat }; });

      const totalPrograms = programs.length;
      const totalInvestment = programs.reduce((s, p) => s + Math.max(0, p.subsidizedCost), 0);

      debug.push("Total: " + totalPrograms + " programs, " + fmt$(totalInvestment) + " subsidized cost");
      setDebugInfo(debug.join("\n"));
      setMatrixData({ byCode, rankData, totalPrograms, totalInvestment, oppByCode, programs, catMap });
    } catch (err) { setError("Error: " + err.message); }
    setLoading(false);
  };

  const reset = () => { setMatrixData(null); setFile1(null); setFile2(null); setFile1Name(""); setFile2Name(""); setError(""); setDebugInfo(""); setActiveTab("matrix"); setMedianNote(""); setCostThreshold(""); };

  const Q = {
    hiLo: { bg: "#edf7f1", border: "#1B8A5A", title: "#136B44" },
    hiHi: { bg: "#e9f0f8", border: "#0076D6", title: "#003B5C" },
    loLo: { bg: "#fef8e8", border: "#B8870A", title: "#7d5d00" },
    loHi: { bg: "#fce8e8", border: "#C53030", title: "#8e1c1c" },
  };

  const tabStyle = (active) => ({
    padding: "10px 24px", fontSize: 13, fontWeight: 700, cursor: "pointer", border: "none",
    borderBottom: active ? `3px solid ${TY.blue}` : "3px solid transparent",
    background: "transparent", color: active ? TY.blue : TY.textLight,
    transition: "all 0.2s",
  });

  const btnStyle = (color) => ({
    padding: "8px 18px", fontSize: 12, fontWeight: 600, borderRadius: 6,
    border: `1px solid ${color}`, background: color + "12", color: color, cursor: "pointer",
    opacity: exporting ? 0.5 : 1, transition: "all 0.2s",
  });

  const inputStyle = {
    width: "100%", padding: "10px 14px", fontSize: 14, borderRadius: 6,
    border: `1px solid ${TY.border}`, background: TY.white, color: TY.text, outline: "none", boxSizing: "border-box",
  };

  return (
    <div style={{ fontFamily: "'Segoe UI', 'Helvetica Neue', Arial, sans-serif", minHeight: "100vh", background: TY.lightGray, color: TY.text }}>
      {/* Header */}
      <div style={{ padding: "16px 28px", background: TY.navy, display: "flex", alignItems: "center", gap: 16 }}>
        <div>
          <h1 style={{ margin: 0, fontSize: 22, fontWeight: 800, color: TY.white, letterSpacing: -0.3 }}>
            Program Impact Matrix
          </h1>
          <p style={{ margin: "2px 0 0", fontSize: 12, color: "#8bb8d4" }}>Impact vs Cost · Mandate vs Reliance</p>
        </div>
      </div>

      {/* Upload Panel */}
      {!matrixData && (
        <div style={{ maxWidth: 660, margin: "36px auto", padding: "0 20px" }}>
          <div style={{
            background: TY.white, border: `1px solid ${TY.border}`, borderRadius: 10, padding: 32,
            boxShadow: "0 4px 12px rgba(0,0,0,0.06)",
          }}>
            <h2 style={{ margin: "0 0 24px", fontSize: 17, fontWeight: 700, color: TY.navy }}>Upload Files to Generate Reports</h2>

            <div style={{ marginBottom: 20 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: TY.textLight, display: "block", marginBottom: 6 }}>Entity Name</label>
              <input type="text" value={entityName} onChange={(e) => setEntityName(e.target.value)} placeholder="e.g. City of Olympia, WA" style={inputStyle} />
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 24 }}>
              {[
                { label: "File 1 — Summary Report", desc: "Tab 1: Programs, Scores, Costs", file: file1, name: file1Name, id: "f1",
                  handler: handleFile1 },
                { label: "File 2 — Program Scores", desc: "Tab 2: Mandate & Reliance Scores", file: file2, name: file2Name, id: "f2",
                  handler: (e) => { const f = e.target.files[0]; if (f) { setFile2(f); setFile2Name(f.name); } } },
              ].map((item) => (
                <div key={item.id}>
                  <label style={{ fontSize: 12, fontWeight: 600, color: TY.textLight, display: "block", marginBottom: 6 }}>{item.label}</label>
                  <div style={{
                    border: `2px dashed ${item.file ? TY.green : TY.border}`, borderRadius: 8, padding: 20,
                    textAlign: "center", cursor: "pointer", background: item.file ? "#f0faf5" : TY.lightGray,
                    transition: "all 0.2s",
                  }} onClick={() => document.getElementById(item.id).click()}>
                    <input id={item.id} type="file" accept=".xlsx,.xls" onChange={item.handler} style={{ display: "none" }} />
                    {item.file
                      ? <React.Fragment><div style={{ fontSize: 20, color: TY.green }}>✓</div><div style={{ fontSize: 11, color: TY.green, fontWeight: 600, marginTop: 2 }}>{item.name}</div></React.Fragment>
                      : <React.Fragment><div style={{ fontSize: 22, opacity: 0.3, marginBottom: 2 }}>📊</div><div style={{ fontSize: 11, color: TY.textLight }}>{item.desc}</div></React.Fragment>
                    }
                  </div>
                </div>
              ))}
            </div>

            <div style={{ marginBottom: 24 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: TY.textLight, display: "block", marginBottom: 6 }}>
                Cost Threshold (Subsidized Cost — High/Low boundary)
              </label>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <input type="number" value={costThreshold} onChange={(e) => setCostThreshold(e.target.value)} placeholder="Auto-calculated from median"
                  style={{ ...inputStyle, width: 220 }} />
              </div>
              {medianNote && (
                <div style={{ fontSize: 11, color: TY.blue, marginTop: 6, fontStyle: "italic" }}>
                  {medianNote}
                </div>
              )}
            </div>

            {error && <div style={{ color: TY.red, fontSize: 12, marginBottom: 14, padding: "10px 14px", background: "#fef2f2", borderRadius: 6, border: `1px solid ${TY.red}22` }}>{error}</div>}

            <button onClick={processData} disabled={loading || !file1 || !file2}
              style={{
                width: "100%", padding: "14px", fontSize: 15, fontWeight: 700, borderRadius: 8, border: "none",
                cursor: (file1 && file2 && !loading) ? "pointer" : "not-allowed",
                background: (file1 && file2) ? TY.orange : TY.border,
                color: (file1 && file2) ? TY.white : TY.textLight,
                opacity: loading ? 0.6 : 1, transition: "all 0.2s",
                boxShadow: (file1 && file2) ? "0 2px 8px rgba(242,104,42,0.3)" : "none",
              }}>
              {loading ? "Processing..." : "Generate Reports"}
            </button>

            {debugInfo && (
              <details style={{ marginTop: 14 }}>
                <summary style={{ fontSize: 11, color: TY.textLight, cursor: "pointer" }}>Processing details</summary>
                <pre style={{ fontSize: 10, color: TY.textLight, background: TY.lightGray, padding: 10, borderRadius: 6, whiteSpace: "pre-wrap", marginTop: 6, border: `1px solid ${TY.border}` }}>{debugInfo}</pre>
              </details>
            )}
          </div>
        </div>
      )}

      {/* Results */}
      {matrixData && (
        <div style={{ padding: "0 20px 40px" }}>
          <div style={{ maxWidth: 1150, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 0 0", flexWrap: "wrap", gap: 8 }}>
            <div style={{ display: "flex", gap: 4 }}>
              <button onClick={() => setActiveTab("matrix")} style={tabStyle(activeTab === "matrix")}>Impact Matrix</button>
              <button onClick={() => setActiveTab("opportunities")} style={tabStyle(activeTab === "opportunities")}>Opportunities Chart</button>
              <button onClick={() => setActiveTab("programs")} style={tabStyle(activeTab === "programs")}>Program Details</button>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <button onClick={exportPNG} disabled={exporting} style={btnStyle(TY.blue)}>{exporting ? "..." : "Export PNG"}</button>
              <button onClick={exportPDF} disabled={exporting} style={btnStyle(TY.green)}>{exporting ? "..." : "Export PDF"}</button>
              <button onClick={exportExcel} disabled={exporting} style={btnStyle(TY.orange)}>{exporting ? "..." : "Export Excel"}</button>
              <button onClick={reset} style={{ padding: "8px 18px", fontSize: 12, fontWeight: 600, borderRadius: 6, border: `1px solid ${TY.border}`, background: TY.white, color: TY.textLight, cursor: "pointer" }}>← New Files</button>
            </div>
          </div>

          <div style={{ marginTop: 12 }}>
            {activeTab === "matrix" && (
              <div ref={matrixRef} style={{ background: TY.white, borderRadius: 8, color: TY.text, maxWidth: 1150, margin: "0 auto", padding: 20, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14, flexWrap: "wrap", gap: 10 }}>
                  <div>
                    <h2 style={{ margin: 0, fontSize: 20, fontWeight: 800, color: TY.navy }}>{entityName || "Impact Matrix"}</h2>
                    <div style={{ fontSize: 11, color: TY.textLight, marginTop: 3, lineHeight: 1.5 }}>
                      <strong>Impact vs Cost</strong> perspective (Bang for the Buck - primary axes)<br />
                      — with subset dimensions of <strong>Mandate vs Reliance</strong> (span of control dimensions)
                    </div>
                  </div>
                  <div style={{ textAlign: "right", fontSize: 11, color: TY.textLight }}>
                    <div><strong style={{ color: TY.text }}>{matrixData.totalPrograms}</strong> programs under review</div>
                    <div><strong style={{ color: TY.text }}>{fmt$(matrixData.totalInvestment)}</strong> total subsidized cost</div>
                    <div style={{ fontSize: 9, color: "#999", marginTop: 2 }}>Subsidized Cost = Total Cost - Revenue</div>
                  </div>
                </div>

                <div style={{ display: "flex", gap: 0 }}>
                  <div style={{ position: "relative", minWidth: 28, padding: "0 4px" }}>
                    <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%) rotate(-90deg)", fontSize: 15, fontWeight: 900, color: TY.navy, letterSpacing: 3, whiteSpace: "nowrap" }}>IMPACT &gt;&gt;&gt;</div>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "grid", gridTemplateColumns: "20px 1fr 1fr", gap: 8, marginBottom: 2 }}>
                      <div />
                      <div style={{ fontSize: 9, textAlign: "center", color: TY.textLight, fontWeight: 600 }}>Lower Cost</div>
                      <div style={{ fontSize: 9, textAlign: "center", color: TY.textLight, fontWeight: 600 }}>Higher Cost</div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "20px 1fr 1fr", gap: 8, marginBottom: 6 }}>
                      <div style={{ position: "relative", width: 20 }}><div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%) rotate(-90deg)", fontSize: 9, fontWeight: 700, color: TY.green, whiteSpace: "nowrap" }}>Higher Impact</div></div>
                      <QuadrantBox title="High Impact, Low Cost" titleColor={Q.hiLo.title} bgColor={Q.hiLo.bg} borderColor={Q.hiLo.border}
                        codes={["LHLH", "LHHH", "LHLL", "LHHL"]} dataByCode={matrixData.byCode} rankData={matrixData.rankData} />
                      <QuadrantBox title="High Impact, High Cost" titleColor={Q.hiHi.title} bgColor={Q.hiHi.bg} borderColor={Q.hiHi.border}
                        codes={["HHLH", "HHHH", "HHLL", "HHHL"]} dataByCode={matrixData.byCode} rankData={matrixData.rankData} />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "20px 1fr 1fr", gap: 8 }}>
                      <div style={{ position: "relative", width: 20 }}><div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%) rotate(-90deg)", fontSize: 9, fontWeight: 700, color: TY.yellow, whiteSpace: "nowrap" }}>Lower Impact</div></div>
                      <QuadrantBox title="Low Impact, Low Cost" titleColor={Q.loLo.title} bgColor={Q.loLo.bg} borderColor={Q.loLo.border}
                        codes={["LLLH", "LLHH", "LLLL", "LLHL"]} dataByCode={matrixData.byCode} rankData={matrixData.rankData} />
                      <QuadrantBox title="Low Impact, High Cost" titleColor={Q.loHi.title} bgColor={Q.loHi.bg} borderColor={Q.loHi.border}
                        codes={["HLLH", "HLHH", "HLLL", "HLHL"]} dataByCode={matrixData.byCode} rankData={matrixData.rankData} />
                    </div>
                    <div style={{ textAlign: "center", marginTop: 10, fontSize: 15, fontWeight: 900, color: TY.navy, letterSpacing: 3 }}>COST &gt;&gt;&gt;</div>
                  </div>
                </div>
              </div>
            )}

            {activeTab === "opportunities" && (
              <div ref={opportunitiesRef}><OpportunitiesChart matrixData={matrixData} entityName={entityName} /></div>
            )}

            {activeTab === "programs" && (
              <div ref={programsRef}><ProgramList matrixData={matrixData} entityName={entityName} /></div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
